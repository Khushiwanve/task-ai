name: CI Check + Auto Deploy

on:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout 
        uses: actions/checkout@v4

      - name: Node.js setup 
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dependencies install 
        run: npm install

      - name: Check all files 
        run: |
          echo "✅ Dependencies installed!"
          echo "📁 Project files:"
          ls -la public/